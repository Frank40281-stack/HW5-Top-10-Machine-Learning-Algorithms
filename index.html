<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機器學習 Top 10 演算法互動學習平台 | Interactive ML Learning Hub</title>
    <meta name="description" content="一個以豐富視覺與高互動性設計的機器學習 Top 10 演算法學習平台，包含即時動態模擬、精選程式碼、觀念問答與演算法評估。">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* CSS RESET & VARIABLES */
        :root {
            --bg-dark: #0B0F19;
            --bg-card: rgba(20, 27, 45, 0.7);
            --bg-card-hover: rgba(30, 37, 55, 0.85);
            --border-glow: rgba(255, 255, 255, 0.08);
            
            /* Algorithm Category Colors */
            --regression-color: #6366F1; /* Indigo */
            --regression-glow: rgba(99, 102, 241, 0.15);
            --classification-color: #10B981; /* Emerald */
            --classification-glow: rgba(16, 185, 129, 0.15);
            --clustering-color: #F59E0B; /* Amber */
            --clustering-glow: rgba(245, 158, 11, 0.15);
            --pca-color: #06B6D4; /* Cyan */
            --pca-glow: rgba(6, 182, 212, 0.15);

            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --text-dark: #1F2937;
            
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
        }

        h1, h2, h3, h4 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(11, 15, 25, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* LAYOUT CONTAINER */
        .app-container {
            display: flex;
            min-height: 100vh;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(245, 158, 11, 0.05) 0px, transparent 50%);
            background-attachment: fixed;
        }

        /* SIDEBAR */
        .sidebar {
            width: 350px;
            background: rgba(13, 18, 30, 0.9);
            border-right: 1px solid var(--border-glow);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            flex-shrink: 0;
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--regression-color), var(--classification-color));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .logo-text h2 {
            font-size: 1.25rem;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .algo-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 0.25rem;
        }

        .algo-item {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .algo-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: transparent;
            transition: var(--transition-smooth);
        }

        .algo-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateX(3px);
        }

        .algo-item.active {
            background: var(--bg-card);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .algo-item.active.regression::before { background: var(--regression-color); }
        .algo-item.active.classification::before { background: var(--classification-color); }
        .algo-item.active.clustering::before { background: var(--clustering-color); }
        .algo-item.active.pca::before { background: var(--pca-color); }

        .algo-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }

        .algo-badge {
            align-self: flex-start;
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .regression .algo-badge { background: rgba(99, 102, 241, 0.15); color: #818cf8; }
        .classification .algo-badge { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .clustering .algo-badge { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .pca .algo-badge { background: rgba(6, 182, 212, 0.15); color: #22d3ee; }

        /* MAIN CONTENT AREA */
        .main-content {
            flex-grow: 1;
            padding: 2rem 2.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* TOP HEADER CARD */
        .header-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 2rem;
            backdrop-filter: blur(16px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
        }

        .header-card::after {
            content: '';
            position: absolute;
            right: -100px;
            top: -100px;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 1;
        }

        .header-card.regression::after { background: var(--regression-color); }
        .header-card.classification::after { background: var(--classification-color); }
        .header-card.clustering::after { background: var(--clustering-color); }
        .header-card.pca::after { background: var(--pca-color); }

        .header-left {
            z-index: 2;
        }

        .module-indicator {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .module-indicator span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .regression .module-indicator span { background-color: var(--regression-color); }
        .classification .module-indicator span { background-color: var(--classification-color); }
        .clustering .module-indicator span { background-color: var(--clustering-color); }
        .pca .module-indicator span { background-color: var(--pca-color); }

        .algo-title {
            font-size: 2.2rem;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .formula-box {
            background: rgba(0, 0, 0, 0.25);
            border-left: 3px solid transparent;
            padding: 0.75rem 1.25rem;
            border-radius: 0 8px 8px 0;
            font-family: 'Fira Code', monospace;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }

        .regression .formula-box { border-left-color: var(--regression-color); }
        .classification .formula-box { border-left-color: var(--classification-color); }
        .clustering .formula-box { border-left-color: var(--clustering-color); }
        .pca .formula-box { border-left-color: var(--pca-color); }

        .formula-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* GRID: SANDBOX & DETAILS */
        .workspace-grid {
            display: grid;
            grid-template-columns: 550px 1fr;
            gap: 2rem;
            align-items: start;
        }

        @media (max-width: 1100px) {
            .workspace-grid {
                grid-template-columns: 1fr;
            }
        }

        /* SANDBOX CARD */
        .sandbox-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: 1.5rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sandbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sandbox-title {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sandbox-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .canvas-wrapper {
            position: relative;
            background: #060913;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
            aspect-ratio: 1;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }

        .canvas-overlay-coords {
            position: absolute;
            bottom: 10px;
            right: 12px;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        /* CONTROLS AREA */
        .controls-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .class-selector {
            display: flex;
            gap: 0.75rem;
        }

        .btn-class {
            flex: 1;
            padding: 0.6rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition-smooth);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .btn-class.active[data-class="0"] {
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.4);
            color: #c084fc;
        }

        .btn-class.active[data-class="1"] {
            background: rgba(6, 182, 212, 0.15);
            border-color: rgba(6, 182, 212, 0.4);
            color: #22d3ee;
        }

        .bullet {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .bullet-purple { background: #a855f7; box-shadow: 0 0 8px #a855f7; }
        .bullet-cyan { background: #06b6d4; box-shadow: 0 0 8px #06b6d4; }

        .btn-group {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            flex: 1;
            padding: 0.65rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-primary {
            background: var(--regression-color);
            border-color: transparent;
        }

        .btn-primary:hover {
            background: #4f46e5;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.35);
        }

        /* PARAMETER ADJUSTMENT PANELS */
        .param-panel {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            font-size: 0.85rem;
        }

        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .param-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .param-value {
            font-family: 'Fira Code', monospace;
            font-weight: 600;
            color: var(--text-main);
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            transition: var(--transition-smooth);
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--regression-color);
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
            transition: var(--transition-smooth);
        }

        .regression .slider::-webkit-slider-thumb { background: var(--regression-color); }
        .classification .slider::-webkit-slider-thumb { background: var(--classification-color); }
        .clustering .slider::-webkit-slider-thumb { background: var(--clustering-color); }
        .pca .slider::-webkit-slider-thumb { background: var(--pca-color); }

        .select-input {
            background: rgba(13, 18, 30, 0.9);
            color: var(--text-main);
            border: 1px solid var(--border-glow);
            padding: 0.4rem 0.75rem;
            border-radius: 8px;
            outline: none;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* METRICS PANEL */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 0.75rem;
            text-align: center;
        }

        .metric-val {
            font-size: 1.1rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        .metric-lbl {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* TABS PANEL FOR DETAILS */
        .details-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            min-height: 500px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-header {
            display: flex;
            border-bottom: 1px solid var(--border-glow);
            background: rgba(0, 0, 0, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-size: 0.9rem;
            text-align: center;
        }

        .tab-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.02);
        }

        .tab-btn.active {
            color: white;
        }

        .regression .tab-btn.active { border-bottom-color: var(--regression-color); }
        .classification .tab-btn.active { border-bottom-color: var(--classification-color); }
        .clustering .tab-btn.active { border-bottom-color: var(--clustering-color); }
        .pca .tab-btn.active { border-bottom-color: var(--pca-color); }

        .tab-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: none;
            overflow-y: auto;
            max-height: 550px;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CONCEPT TAB STYLING */
        .concept-section {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .concept-title {
            font-size: 1.1rem;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.35rem;
        }

        .pros-cons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .pros-cons-grid {
                grid-template-columns: 1fr;
            }
        }

        .card-pros, .card-cons {
            border-radius: 12px;
            padding: 1rem;
        }

        .card-pros {
            background: rgba(16, 185, 129, 0.05);
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .card-cons {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }

        .card-pros h4 { color: #34d399; margin-bottom: 0.5rem; font-size: 0.95rem; }
        .card-cons h4 { color: #f87171; margin-bottom: 0.5rem; font-size: 0.95rem; }

        .card-pros ul, .card-cons ul {
            padding-left: 1.1rem;
            font-size: 0.82rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        /* QUIZ TAB STYLING */
        .quiz-container {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .quiz-question {
            font-size: 1.05rem;
            font-weight: 600;
            color: white;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .quiz-option {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 0.85rem 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .quiz-option:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .quiz-option.correct {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.4);
            color: #34d399;
        }

        .quiz-option.incorrect {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        .quiz-option-marker {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .quiz-option.correct .quiz-option-marker {
            background: #10b981;
            border-color: transparent;
            color: white;
        }

        .quiz-option.incorrect .quiz-option-marker {
            background: #ef4444;
            border-color: transparent;
            color: white;
        }

        .quiz-feedback {
            margin-top: 0.5rem;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .quiz-feedback.show {
            display: block;
        }

        .quiz-feedback h4 {
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }

        .quiz-feedback p {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        /* CODE TAB STYLING */
        .code-container {
            position: relative;
        }

        .code-box {
            background: #060913;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1.25rem;
            overflow-x: auto;
            font-family: 'Fira Code', monospace;
            font-size: 0.82rem;
            color: #e2e8f0;
            margin-top: 1rem;
        }

        .btn-copy {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            padding: 0.25rem 0.5rem;
            color: var(--text-muted);
            font-size: 0.72rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-weight: 600;
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* RESPONSIVE DESIGN */
        @media (max-width: 900px) {
            .app-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border-glow);
                padding: 1.5rem;
            }
            .algo-list {
                flex-direction: row;
                overflow-x: auto;
                flex-wrap: nowrap;
                height: auto;
                padding-bottom: 0.5rem;
            }
            .algo-item {
                flex-shrink: 0;
                width: 220px;
            }
            .main-content {
                padding: 1.5rem 1rem;
            }
        }
    </style>

    function setupSidebar() {
        const listContainer = document.getElementById('algoList');
        listContainer.innerHTML = '';
        
        Object.values(ALGO_DATA).forEach(algo => {
            const item = document.createElement('div');
            item.className = `algo-item ${algo.category}`;
            item.dataset.id = algo.id;
            
            let badgeText = '預測';
            if(algo.category === 'classification') badgeText = '分類';
            else if(algo.category === 'clustering') badgeText = '分群';
            else if(algo.category === 'pca') badgeText = '降維';

            item.innerHTML = `
                <div class="algo-name">${algo.name}</div>
                <div class="algo-badge">${badgeText}</div>
            `;
            
            item.addEventListener('click', () => {
                // Remove active class from all
                document.querySelectorAll('.algo-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');
                loadAlgorithm(algo.id);
            });
            
            listContainer.appendChild(item);
        });

        // Set initial active item
        const firstItem = listContainer.querySelector(`[data-id="${currentAlgoId}"]`);
        if (firstItem) firstItem.classList.add('active');
    }

    function setupTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                
                btn.classList.add('active');
                const targetTab = btn.dataset.tab;
                activeTab = targetTab;
                document.getElementById(`tab-${targetTab}`).classList.add('active');
            });
        });
    }

    function setupEventListeners() {
        // Point addition click
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            // Map mouse click to [0, 1] values
            const x = (e.clientX - rect.left) / rect.width;
            const y = 1.0 - (e.clientY - rect.top) / rect.height; // Invert Y so 0 is bottom
            
            addPoint(x, y, selectedClass);
        });

        // Coordinates display on hover
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = 1.0 - (e.clientY - rect.top) / rect.height;
            coordsOverlay.textContent = `X: ${x.toFixed(2)}, Y: ${y.toFixed(2)}`;
            
            // For KNN interactive hover prediction boundary visualization
            if (currentAlgoId === 'knn' && currentPoints.length > 0) {
                runSimulationAndDraw();
                // Draw dynamic hover pointer prediction
                drawKNNHoverScope(e.clientX - rect.left, e.clientY - rect.top, x, y);
            }
        });

        // Class selection toggles
        document.querySelectorAll('.btn-class').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn-class').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                selectedClass = parseInt(btn.dataset.class);
            });
        });

        // Clear buttons
        document.getElementById('btnClear').addEventListener('click', () => {
            currentPoints = [];
            runSimulationAndDraw();
        });

        // Copy Code Snippet
        document.getElementById('btnCopyCode').addEventListener('click', () => {
            const code = document.getElementById('codeSnippet').innerText;
            navigator.clipboard.writeText(code).then(() => {
                const btn = document.getElementById('btnCopyCode');
                btn.innerText = '已複製!';
                setTimeout(() => btn.innerText = '複製代碼', 1500);
            });
        });
    }

    function resizeCanvas() {
        // Keeps the rendering buffer matches client display
        const rect = canvas.parentNode.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.width; // keep square aspect-ratio
        runSimulationAndDraw();
    }

    // ----------------------------------------------------
    // QUIZ COMPONENT
    // ----------------------------------------------------
    function loadQuiz(quiz) {
        document.getElementById('quizQuestion').innerText = quiz.question;
        const optionsContainer = document.getElementById('quizOptions');
        optionsContainer.innerHTML = '';
        
        const feedback = document.getElementById('quizFeedback');
        feedback.className = 'quiz-feedback'; // Hide
        
        quiz.options.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'quiz-option';
            btn.innerHTML = `
                <div class="quiz-option-marker">${String.fromCharCode(65 + idx)}</div>
                <span>${opt}</span>
            `;
            
            btn.addEventListener('click', () => {
                // Avoid double submission
                if (feedback.classList.contains('show')) return;
                
                // Highlight options based on accuracy
                const allOpts = optionsContainer.querySelectorAll('.quiz-option');
                if (idx === quiz.correct) {
                    btn.classList.add('correct');
                    showQuizFeedback(true, quiz.explanation);
                } else {
                    btn.classList.add('incorrect');
                    allOpts[quiz.correct].classList.add('correct');
                    showQuizFeedback(false, quiz.explanation);
                }
            });
            optionsContainer.appendChild(btn);
        });
    }

    function showQuizFeedback(isCorrect, explanationText) {
        const feedback = document.getElementById('quizFeedback');
        const title = document.getElementById('feedbackTitle');
        const text = document.getElementById('feedbackText');
        
        if (isCorrect) {
            feedback.style.borderColor = 'rgba(16, 185, 129, 0.3)';
            title.innerHTML = '🎉 回答正確！';
            title.style.color = '#34d399';
        } else {
            feedback.style.borderColor = 'rgba(239, 68, 68, 0.3)';
            title.innerHTML = '❌ 回答錯誤';
            title.style.color = '#f87171';
        }
        
        text.innerText = explanationText;
        feedback.classList.add('show');
    }

    // ----------------------------------------------------
    // LOAD DEMO DATASET
    // ----------------------------------------------------
    function loadDemoDataset(algoId) {
        currentPoints = [];
        
        if (algoId === 'linear_regression') {
            // Regression line trend points
            for(let i = 0; i < 15; i++) {
                let x = 0.1 + i * 0.05 + (Math.random() - 0.5) * 0.04;
                let y = 0.2 + x * 0.6 + (Math.random() - 0.5) * 0.08;
                currentPoints.push({x: clamp(x, 0, 1), y: clamp(y, 0, 1), label: 0});
            }
        } 
        else if (algoId === 'kmeans') {
            // Three distinctive blobs
            const blobs = [
                {cx: 0.3, cy: 0.7, std: 0.08},
                {cx: 0.7, cy: 0.6, std: 0.08},
                {cx: 0.4, cy: 0.3, std: 0.08}
            ];
            blobs.forEach(b => {
                for(let i = 0; i < 8; i++) {
                    currentPoints.push({
                        x: clamp(b.cx + (Math.random() - 0.5) * b.std * 2, 0, 1),
                        y: clamp(b.cy + (Math.random() - 0.5) * b.std * 2, 0, 1),
                        label: 0
                    });
                }
            });
        } 
        else if (algoId === 'pca') {
            // Highly correlated cigar-shaped cluster
            const cx = 0.5, cy = 0.5;
            for(let i = 0; i < 20; i++) {
                let u = (Math.random() - 0.5) * 0.6; // along primary direction
                let v = (Math.random() - 0.5) * 0.15; // along secondary direction
                // rotate by 30 degrees
                let theta = 30 * Math.PI / 180;
                let x = cx + u * Math.cos(theta) - v * Math.sin(theta);
                let y = cy + u * Math.sin(theta) + v * Math.cos(theta);
                currentPoints.push({x: clamp(x, 0, 1), y: clamp(y, 0, 1), label: 0});
            }
        } 
        else {
            // Classification problem: non-linear separation (Moons-like dataset)
            // Class 0 (Purple)
            for(let i = 0; i < 12; i++) {
                let theta = (i / 11) * Math.PI;
                let x = 0.5 + 0.25 * Math.cos(theta) + (Math.random() - 0.5) * 0.05;
                let y = 0.5 + 0.25 * Math.sin(theta) + (Math.random() - 0.5) * 0.05;
                currentPoints.push({x: clamp(x, 0, 1), y: clamp(y, 0, 1), label: 0});
            }
            // Class 1 (Cyan)
            for(let i = 0; i < 12; i++) {
                let theta = (i / 11) * Math.PI;
                let x = 0.5 - 0.25 * Math.cos(theta) + (Math.random() - 0.5) * 0.05;
                let y = 0.35 - 0.25 * Math.sin(theta) + (Math.random() - 0.5) * 0.05;
                currentPoints.push({x: clamp(x, 0, 1), y: clamp(y, 0, 1), label: 1});
            }
        }
    }

    function addPoint(x, y, label) {
        currentPoints.push({ x, y, label });
        runSimulationAndDraw();
    }

    function clamp(val, min, max) {
        return Math.max(min, Math.min(max, val));
    }

                customModelParams.c = parseFloat(val);
                runSimulationAndDraw();
            });
        } 
        else if (algoId === 'decision_tree' || algoId === 'random_forest' || algoId === 'xgboost') {
            customModelParams.maxDepth = 3;
            createSliderParam('最大決策樹深度 (Max Depth)', 1, 6, 3, 1, (val) => {
                customModelParams.maxDepth = parseInt(val);
                runSimulationAndDraw();
            });
            
            if (algoId === 'random_forest') {

                });

            else if (algoId === 'xgboost') {
                customModelParams.numTrees = 4;
                customModelParams.lr = 0.3;
                createSliderParam('Boosting 輪數 (Iter)', 2, 8, 4, 1, (val) => {
                    customModelParams.numTrees = parseInt(val);
                    runSimulationAndDraw();
                });
                createSliderParam('學習率 (Learning Rate η)', 0.1, 0.9, 0.3, 0.1, (val) => {
                    customModelParams.lr = parseFloat(val);
                    runSimulationAndDraw();
                });
            }
        } 
        else if (algoId === 'kmeans') {
            customModelParams.kClusters = 3;
            createSliderParam('聚類分群數 (Clusters K)', 2, 6, 3, 1, (val) => {
                customModelParams.kClusters = parseInt(val);
                runSimulationAndDraw();
            });

        else {
            // For standard regression or PCA which don't require parameters
            panel.innerHTML = '<div style="color: var(--text-muted); font-size: 0.8rem; text-align: center;">此演算法沙盒暫無外部參數需調整</div>';
        }
    }

    function createSliderParam(label, min, max, value, step, onChange) {
        const panel = document.getElementById('paramPanel');
        const container = document.createElement('div');
        container.style.display = 'flex';
        container.style.flexDirection = 'column';
        container.style.gap = '0.35rem';
        
        const sliderId = 'slider-' + Math.random().toString(36).substring(7);

        container.innerHTML = `
            <div class="param-row">
                <span class="param-label">${label}</span>
                <span class="param-value" id="${sliderId}-val">${value}</span>
            </div>
            <input type="range" class="slider" id="${sliderId}" min="${min}" max="${max}" value="${value}" step="${step}">
        `;
        
        panel.appendChild(container);

        const rangeInput = container.querySelector('input');
        rangeInput.addEventListener('input', (e) => {
            document.getElementById(`${sliderId}-val`).innerText = e.target.value;
            onChange(e.target.value);
        });
    }

    // CORE MACHINE LEARNING MODELS IN JAVASCRIPT
    // ----------------------------------------------------

    // 1. Linear Regression
    function solveLinearRegression(points) {
        if (points.length < 2) return null;
        let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
        let n = points.length;
        for (let p of points) {
            sumX += p.x;
            sumY += p.y;
            sumXY += p.x * p.y;
            sumXX += p.x * p.x;
        }
        let num = (n * sumXY) - (sumX * sumY);
        let den = (n * sumXX) - (sumX * sumX);
        if (Math.abs(den) < 1e-6) return null;
        let m = num / den;
        let c = (sumY - m * sumX) / n;
        
        // Calculate MSE and R2
        let mse = 0, totalVar = 0;
        let meanY = sumY / n;
        for (let p of points) {
            let pred = m * p.x + c;
            mse += (p.y - pred) ** 2;
            totalVar += (p.y - meanY) ** 2;
        }
        mse /= n;
        let r2 = totalVar > 1e-6 ? 1.0 - (mse * n / totalVar) : 1.0;
        
        return { m, c, mse, r2 };
    }

    // 2. Logistic Regression with basic SGD
    function solveLogisticRegression(points, penaltyC) {
        let w = [0.0, 0.0];
        let b = 0.0;
        let n = points.length;
        if (n === 0) return { w, b };
        
        let lr = 0.15;
        let epochs = 250;
        let lambda = 1.0 / (penaltyC + 1e-5); // map C value to lambda regularization
        
        for (let epoch = 0; epoch < epochs; epoch++) {
            for (let p of points) {
                let z = w[0] * p.x + w[1] * p.y + b;
                let pred = 1 / (1 + Math.exp(-z));
                let error = p.label - pred;
                
                // updates weight with L2 regularization
                w[0] += lr * (error * p.x - (lambda / n) * w[0]);
                w[1] += lr * (error * p.y - (lambda / n) * w[1]);
                b += lr * error;
            }
        }
        return { w, b };
    }
    
    function predictLogistic(model, x, y) {
        let z = model.w[0] * x + model.w[1] * y + model.b;
        return 1.0 / (1.0 + Math.exp(-z));
    }

    // 3. KNN prediction
    function queryKNN(points, x, y, k) {
        if (points.length === 0) return 0.5;
        let dists = points.map(p => {
            let d = (p.x - x) ** 2 + (p.y - y) ** 2;
            return { dist: d, label: p.label, p };
        });
        dists.sort((a, b) => a.dist - b.dist);
        let activeK = Math.min(k, dists.length);
        let votesClass1 = 0;
        for (let i = 0; i < activeK; i++) {
            if (dists[i].label === 1) votesClass1++;
        }
        return votesClass1 / activeK;
    }

    // 4. SVM with dual RBF kernel representation
    function solveSVM(points, C) {
        let n = points.length;
        let alphas = new Array(n).fill(0.0);
        let b = 0.0;
        if (n === 0) return { alphas, b };
        
        let y = points.map(p => p.label === 1 ? 1 : -1);
        let gamma = 8.0; // standard RBF spread
        let lr = 0.05;
        
        // gradient ascent / descent optimizer for dual SVM representation
        for (let epoch = 0; epoch < 200; epoch++) {
            for (let j = 0; j < n; j++) {
                let val = 0;
                for (let i = 0; i < n; i++) {
                    let dist2 = (points[i].x - points[j].x)**2 + (points[i].y - points[j].y)**2;
                    let kernel = Math.exp(-gamma * dist2);
                    val += alphas[i] * y[i] * kernel;
                }
                val += b;
                
                let err = y[j] - val;
                
                // Dual update bounded by C
                alphas[j] = clamp(alphas[j] + lr * err, 0, C);
                b += lr * err;
            }
        }
        return { alphas, b, gamma, y };
    }

    function predictSVM(model, points, x, y) {
        let n = points.length;
        if (n === 0) return 0.5;
        let val = 0;
        for (let i = 0; i < n; i++) {
            let dist2 = (points[i].x - x)**2 + (points[i].y - y)**2;
            let kernel = Math.exp(-model.gamma * dist2);
            val += model.alphas[i] * model.y[i] * kernel;
        }
        val += model.b;
        return 1.0 / (1.0 + Math.exp(-2.0 * val)); // scaled Sigmoid
    }

    // 5. Naive Bayes 2D Gaussian density function
    function fitNaiveBayes(points) {
        let stats = {
            0: { count: 0, meanX: 0, meanY: 0, varX: 0, varY: 0, prior: 0 },
            1: { count: 0, meanX: 0, meanY: 0, varX: 0, varY: 0, prior: 0 }
        };
        
        for (let p of points) {
            stats[p.label].count++;
            stats[p.label].meanX += p.x;
            stats[p.label].meanY += p.y;
        }
        
        let total = points.length;
        if (total === 0) return stats;
        
        for (let c of [0, 1]) {
            stats[c].prior = stats[c].count / total;
            if (stats[c].count > 0) {
                stats[c].meanX /= stats[c].count;
                stats[c].meanY /= stats[c].count;
            }
        }
        
        for (let p of points) {
            stats[p.label].varX += (p.x - stats[p.label].meanX) ** 2;
            stats[p.label].varY += (p.y - stats[p.label].meanY) ** 2;
        }
        
        for (let c of [0, 1]) {
            if (stats[c].count > 1) {
                stats[c].varX /= (stats[c].count - 1);
                stats[c].varY /= (stats[c].count - 1);
            } else {
                stats[c].varX = 0.02;
                stats[c].varY = 0.02;
            }
            if (stats[c].varX < 1e-3) stats[c].varX = 1e-3;
            if (stats[c].varY < 1e-3) stats[c].varY = 1e-3;
        }
        return stats;
    }

    function predictNaiveBayes(stats, x, y) {
        if (stats[0].count === 0 && stats[1].count === 0) return 0.5;
        if (stats[0].count === 0) return 1.0;
        if (stats[1].count === 0) return 0.0;
        
        function normPDF(val, mean, variance) {
            let num = Math.exp(-((val - mean) ** 2) / (2 * variance));
            let den = Math.sqrt(2 * Math.PI * variance);
            return num / den;
        }
        
        let prob0 = stats[0].prior * normPDF(x, stats[0].meanX, stats[0].varX) * normPDF(y, stats[0].meanY, stats[0].varY);
        let prob1 = stats[1].prior * normPDF(x, stats[1].meanX, stats[1].varX) * normPDF(y, stats[1].meanY, stats[1].varY);
        
        let sum = prob0 + prob1;
        if (sum === 0) return 0.5;
        return prob1 / sum;
    }

    // 6. Decision Tree split building
    function fitDecisionTree(points, maxDepth) {
        function build(subset, depth) {
            if (subset.length === 0) return { isLeaf: true, prediction: 0.5 };
            
            let c0 = subset.filter(p => p.label === 0).length;
            let c1 = subset.length - c0;
            
            if (c0 === 0) return { isLeaf: true, prediction: 1.0 };
            if (c1 === 0) return { isLeaf: true, prediction: 0.0 };
            if (depth >= maxDepth) return { isLeaf: true, prediction: c1 / subset.length };
            
            let bestGini = 1.0;
            let bestFeature = null;
            let bestThreshold = null;
            let bestLeft = null;
            let bestRight = null;
            
            function computeGini(n0, n1) {
                let sum = n0 + n1;
                if (sum === 0) return 0;
                let p0 = n0 / sum;
                let p1 = n1 / sum;
                return 1.0 - (p0*p0 + p1*p1);
            }
            
            for (let f of ['x', 'y']) {
                let sorted = [...subset].sort((a,b) => a[f] - b[f]);
                for (let i = 0; i < sorted.length - 1; i++) {
                    let threshold = (sorted[i][f] + sorted[i+1][f]) / 2;
                    let left = sorted.filter(p => p[f] <= threshold);
                    let right = sorted.filter(p => p[f] > threshold);
                    
                    let l0 = left.filter(p => p.label === 0).length;
                    let l1 = left.length - l0;
                    let r0 = right.filter(p => p.label === 0).length;
                    let r1 = right.length - r0;
                    
                    let wGini = (left.length / subset.length) * computeGini(l0, l1) + 
                                 (right.length / subset.length) * computeGini(r0, r1);
                    
                    if (wGini < bestGini) {
                        bestGini = wGini;
                        bestFeature = f;
                        bestThreshold = threshold;
                        bestLeft = left;
                        bestRight = right;
                    }
                }
            }
            
            if (bestFeature === null) {
                return { isLeaf: true, prediction: c1 / subset.length };
            }
            
            return {
                isLeaf: false,
                feature: bestFeature,
                threshold: bestThreshold,
                left: build(bestLeft, depth + 1),
                right: build(bestRight, depth + 1)
            };
        }
        
        return build(points, 0);
    }

    function predictTree(node, x, y) {
        if (node.isLeaf) return node.prediction;
        let val = node.feature === 'x' ? x : y;
        if (val <= node.threshold) {
            return predictTree(node.left, x, y);
        } else {
            return predictTree(node.right, x, y);
        }
    }

    // 7. Random Forest (Multiple Bootstrapped Trees)
    function fitRandomForest(points, numTrees, maxDepth) {
        let trees = [];
        let n = points.length;
        if (n === 0) return trees;
        
        for (let t = 0; t < numTrees; t++) {
            let sample = [];
            for (let i = 0; i < n; i++) {
                sample.push(points[Math.floor(Math.random() * n)]);
            }
            trees.push(fitDecisionTree(sample, maxDepth));
        }
        return trees;
    }

    function predictRandomForest(trees, x, y) {
        if (trees.length === 0) return 0.5;
        let sum = 0;
        for (let tree of trees) {
            sum += predictTree(tree, x, y);
        }
        return sum / trees.length;
    }

    // 8. XGBoost (Boosting regression trees fitting log-odds residual)
    function fitXGBoost(points, numTrees, maxDepth, lr) {
        let n = points.length;
        let F = new Array(n).fill(0.0);
        let trees = [];
        if (n === 0) return { trees, lr };

        function fitResidualTree(subset, depth) {
            if (subset.length === 0) return { isLeaf: true, prediction: 0.0 };
            let avgResidual = subset.reduce((sum, p) => sum + p.res, 0) / subset.length;
            
            if (depth >= maxDepth || subset.length < 3) {
                return { isLeaf: true, prediction: avgResidual };
            }
            
            let bestMSE = Infinity;
            let bestFeature = null;
            let bestThreshold = null;
            let bestLeft = null;
            let bestRight = null;
            
            for (let f of ['x', 'y']) {
                let sorted = [...subset].sort((a, b) => a[f] - b[f]);
                for (let i = 0; i < sorted.length - 1; i++) {
                    let threshold = (sorted[i][f] + sorted[i+1][f]) / 2;
                    let left = sorted.filter(p => p[f] <= threshold);
                    let right = sorted.filter(p => p[f] > threshold);
                    
                    if (left.length === 0 || right.length === 0) continue;
                    
                    let meanL = left.reduce((sum, p) => sum + p.res, 0) / left.length;
                    let meanR = right.reduce((sum, p) => sum + p.res, 0) / right.length;
                    
                    let mse = left.reduce((sum, p) => sum + (p.res - meanL)**2, 0) + 
                              right.reduce((sum, p) => sum + (p.res - meanR)**2, 0);
                    
                    if (mse < bestMSE) {
                        bestMSE = mse;
                        bestFeature = f;
                        bestThreshold = threshold;
                        bestLeft = left;
                        bestRight = right;
                    }
                }
            }
            
            if (bestFeature === null) {
                return { isLeaf: true, prediction: avgResidual };
            }
            
            return {
                isLeaf: false,
                feature: bestFeature,
                threshold: bestThreshold,
                left: fitResidualTree(bestLeft, depth + 1),
                right: fitResidualTree(bestRight, depth + 1)
            };
        }

        for (let t = 0; t < numTrees; t++) {
            let subset = [];
            for (let i = 0; i < n; i++) {
                let p = 1.0 / (1.0 + Math.exp(-F[i]));
                let res = points[i].label - p;
                subset.push({ x: points[i].x, y: points[i].y, res: res });
            }
            
            let tree = fitResidualTree(subset, 0);
            trees.push(tree);
            
            for (let i = 0; i < n; i++) {
                F[i] += lr * predictTree(tree, points[i].x, points[i].y);
            }
        }
        return { trees, lr };
    }

    function predictXGBoost(model, x, y) {
        if (!model.trees || model.trees.length === 0) return 0.5;
        let F = 0.0;
        for (let tree of model.trees) {
            F += model.lr * predictTree(tree, x, y);
        }
        return 1.0 / (1.0 + Math.exp(-F));
    }

    // 9. KMeans Clustering
    function solveKMeans(points, k) {
        let n = points.length;
        if (n === 0) return { centroids: [], assignments: [] };
        
        let centroids = [];
        // K-Means++ style selection or distant random
        for(let i = 0; i < k; i++) {
            let pt = points[Math.floor(Math.random() * n)];
            centroids.push({ x: pt.x, y: pt.y });
        }
        
        let assignments = new Array(n).fill(0);
        let maxIter = 100;
        
        for (let iter = 0; iter < maxIter; iter++) {
            let changed = false;
            for (let i = 0; i < n; i++) {
                let minDist = Infinity;
                let bestCentroid = 0;
                for (let c = 0; c < k; c++) {
                    let d = (points[i].x - centroids[c].x)**2 + (points[i].y - centroids[c].y)**2;
                    if (d < minDist) {
                        minDist = d;
                        bestCentroid = c;
                    }
                }
                if (assignments[i] !== bestCentroid) {
                    assignments[i] = bestCentroid;
                    changed = true;
                }
            }
            
            // Re-center centroids
            let sumsX = new Array(k).fill(0);
            let sumsY = new Array(k).fill(0);
            let counts = new Array(k).fill(0);
            for (let i = 0; i < n; i++) {
                let c = assignments[i];
                sumsX[c] += points[i].x;
                sumsY[c] += points[i].y;
                counts[c]++;
            }
            
            for (let c = 0; c < k; c++) {
                if (counts[c] > 0) {
                    centroids[c].x = sumsX[c] / counts[c];
                    centroids[c].y = sumsY[c] / counts[c];
                }
            }
            if (!changed) break;
        }
        
        // Calculate WCSS
        let wcss = 0;
        for (let i = 0; i < n; i++) {
            let c = assignments[i];
            wcss += (points[i].x - centroids[c].x)**2 + (points[i].y - centroids[c].y)**2;
        }
        
        return { centroids, assignments, wcss };
    }

    // 10. PCA Dimension Reduction
    function solvePCA(points) {
        let n = points.length;
        if (n < 2) return null;
        
        let meanX = 0, meanY = 0;
        for (let p of points) {
            meanX += p.x;
            meanY += p.y;
        }
        meanX /= n;
        meanY /= n;
        
        let cxx = 0, cyy = 0, cxy = 0;
        for (let p of points) {
            let dx = p.x - meanX;
            let dy = p.y - meanY;
            cxx += dx * dx;
            cyy += dy * dy;
            cxy += dx * dy;
        }
        cxx /= n;
        cyy /= n;
        cxy /= n;
        
        let tr = cxx + cyy;
        let det = cxx * cyy - cxy * cxy;
        let desc = Math.max(0, tr * tr - 4 * det);
        let lambda1 = (tr + Math.sqrt(desc)) / 2;
        let lambda2 = (tr - Math.sqrt(desc)) / 2;
        
        let v1x = 0, v1y = 0;
        if (Math.abs(cxy) > 1e-9) {
            v1x = cxy;
            v1y = lambda1 - cxx;
        } else {
            if (cxx > cyy) { v1x = 1; v1y = 0; }
            else { v1x = 0; v1y = 1; }
        }
        let norm = Math.sqrt(v1x*v1x + v1y*v1y);
        if (norm > 0) { v1x /= norm; v1y /= norm; }
        
        let v2x = -v1y;
        let v2y = v1x;
        
        let total = lambda1 + lambda2;
        let varRatio1 = total > 1e-8 ? lambda1 / total : 1.0;
        let varRatio2 = total > 1e-8 ? lambda2 / total : 0.0;
        
        return {
            meanX, meanY,
            pc1: { x: v1x, y: v1y, varRatio: varRatio1, eigenvalue: lambda1 },
            pc2: { x: v2x, y: v2y, varRatio: varRatio2, eigenvalue: lambda2 }
        };
    }

    // ----------------------------------------------------
    // SIMULATION ENGINE & CANVAS DRAWING
    // ----------------------------------------------------
    function runSimulationAndDraw() {
        // Clear screen
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fetch display sizing
        const w = canvas.width;
        const h = canvas.height;
        const algo = ALGO_DATA[currentAlgoId];

        // 1. DRAW DECISION BOUNDARY MESH IF APPLICABLE
        if (algo.category === 'classification' && currentPoints.length > 0) {
            let model;
            if (currentAlgoId === 'logistic_regression') {
                model = solveLogisticRegression(currentPoints, customModelParams.c);
            } else if (currentAlgoId === 'svm') {
                model = solveSVM(currentPoints, customModelParams.c);
            } else if (currentAlgoId === 'naive_bayes') {
                model = fitNaiveBayes(currentPoints);
            } else if (currentAlgoId === 'decision_tree') {
                model = fitDecisionTree(currentPoints, customModelParams.maxDepth);
            } else if (currentAlgoId === 'random_forest') {
                model = fitRandomForest(currentPoints, customModelParams.numTrees, customModelParams.maxDepth);
            } else if (currentAlgoId === 'xgboost') {
                model = fitXGBoost(currentPoints, customModelParams.numTrees, customModelParams.maxDepth, customModelParams.lr);
            }

            // Draw grid prediction boundary
            const gridSize = 80;
            const cellW = w / gridSize;
            const cellH = h / gridSize;
            
            for (let gx = 0; gx < gridSize; gx++) {
                for (let gy = 0; gy < gridSize; gy++) {
                    const px = (gx + 0.5) / gridSize;
                    const py = 1.0 - (gy + 0.5) / gridSize; // map from canvas Y to ML Y
                    
                    let predProb = 0.5;
                    if (currentAlgoId === 'knn') {
                        predProb = queryKNN(currentPoints, px, py, customModelParams.k);
                    } else if (currentAlgoId === 'logistic_regression') {
                        predProb = predictLogistic(model, px, py);
                    } else if (currentAlgoId === 'svm') {
                        predProb = predictSVM(model, currentPoints, px, py);
                    } else if (currentAlgoId === 'naive_bayes') {
                        predProb = predictNaiveBayes(model, px, py);
                    } else if (currentAlgoId === 'decision_tree') {
                        predProb = predictTree(model, px, py);
                    } else if (currentAlgoId === 'random_forest') {
                        predProb = predictRandomForest(model, px, py);
                    } else if (currentAlgoId === 'xgboost') {
                        predProb = predictXGBoost(model, px, py);
                    }

                    // Map prediction color
                    // Purple is Class 0 (high value means class 1, which is cyan)
                    ctx.fillStyle = getInterpolatedColor(predProb);
                    ctx.fillRect(gx * cellW, gy * cellH, cellW + 0.5, cellH + 0.5);
                }
            }
        } 
        
        else if (currentAlgoId === 'kmeans' && currentPoints.length > 0) {
            let res = solveKMeans(currentPoints, customModelParams.kClusters);
            
            // Draw Voronoi cells of Clustering
            const gridSize = 80;
            const cellW = w / gridSize;
            const cellH = h / gridSize;
            
            if (res.centroids.length > 0) {
                for (let gx = 0; gx < gridSize; gx++) {
                    for (let gy = 0; gy < gridSize; gy++) {
                        const px = (gx + 0.5) / gridSize;
                        const py = 1.0 - (gy + 0.5) / gridSize;
                        
                        let minDist = Infinity;
                        let bestCluster = 0;
                        for (let c = 0; c < res.centroids.length; c++) {
                            let d = (px - res.centroids[c].x)**2 + (py - res.centroids[c].y)**2;
                            if (d < minDist) {
                                minDist = d;
                                bestCluster = c;
                            }
                        }
                        ctx.fillStyle = getClusterPastelColor(bestCluster);
                        ctx.fillRect(gx * cellW, gy * cellH, cellW + 0.5, cellH + 0.5);
                    }
                }
            }
        }

        // 2. DRAW GRAPH GRID LINES
        drawGridLines(w, h);

        // 3. DRAW SPECIFIC ALGORITHM ARTIFACTS
        if (currentPoints.length > 0) {
            if (currentAlgoId === 'linear_regression') {
                let model = solveLinearRegression(currentPoints);
                if (model) {
                    // Draw linear regression line
                    ctx.strokeStyle = '#6366F1';
                    ctx.lineWidth = 4;
                    ctx.shadowColor = '#6366F1';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    
                    const xStart = 0;
                    const yStart = model.m * xStart + model.c;
                    const xEnd = 1.0;
                    const yEnd = model.m * xEnd + model.c;
                    
                    ctx.moveTo(xStart * w, h - (yStart * h));
                    ctx.lineTo(xEnd * w, h - (yEnd * h));
                    ctx.stroke();
                    
                    ctx.shadowBlur = 0; // reset
                    
                    updateMetricsPanel({
                        'R² 分數 (R2 Score)': model.r2.toFixed(3),
                        '均方誤差 (MSE)': model.mse.toFixed(4)
                    });
                }
            } 
            else if (currentAlgoId === 'pca') {
                let pca = solvePCA(currentPoints);
                if (pca) {
                    const cx = pca.meanX * w;
                    const cy = h - (pca.meanY * h);
                    
                    // Draw Center Mean
                    ctx.fillStyle = '#ff4757';
                    ctx.beginPath();
                    ctx.arc(cx, cy, 6, 0, 2*Math.PI);
                    ctx.fill();
                    
                    // Draw PC1 Vector
                    ctx.strokeStyle = '#6366F1';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    let scale1 = Math.sqrt(pca.pc1.eigenvalue) * 1.5; // length scaling
                    ctx.lineTo(cx + pca.pc1.x * w * scale1, cy - pca.pc1.y * h * scale1);
                    ctx.stroke();
                    
                    // Draw PC2 Vector
                    ctx.strokeStyle = '#06B6D4';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    let scale2 = Math.sqrt(pca.pc2.eigenvalue) * 1.5;
                    ctx.lineTo(cx + pca.pc2.x * w * scale2, cy - pca.pc2.y * h * scale2);
                    ctx.stroke();
                    
                    updateMetricsPanel({
                        'PC1 解釋變異比': `${(pca.pc1.varRatio * 100).toFixed(1)}%`,
                        'PC2 解釋變異比': `${(pca.pc2.varRatio * 100).toFixed(1)}%`
                    });
                }
            } 
            else if (currentAlgoId === 'kmeans') {
                let res = solveKMeans(currentPoints, customModelParams.kClusters);
                
                // Color points according to their cluster assignments
                currentPoints.forEach((pt, i) => {
                    let clusterIdx = res.assignments[i];
                    pt.clusterLabel = clusterIdx;
                });
                
                // Draw Centroids
                res.centroids.forEach((c, idx) => {
                    const cx = c.x * w;
                    const cy = h - (c.y * h);
                    
                    // Large star or crosshair for centroid
                    ctx.fillStyle = getClusterPrimaryColor(idx);
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2.5;
                    ctx.shadowColor = getClusterPrimaryColor(idx);
                    ctx.shadowBlur = 15;
                    
                    ctx.beginPath();
                    ctx.arc(cx, cy, 10, 0, 2*Math.PI);
                    ctx.fill();
                    ctx.stroke();
                    
                    // Draw cross symbol
                    ctx.beginPath();
                    ctx.moveTo(cx - 5, cy); ctx.lineTo(cx + 5, cy);
                    ctx.moveTo(cx, cy - 5); ctx.lineTo(cx, cy + 5);
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    ctx.shadowBlur = 0;
                });
                
                updateMetricsPanel({
                    '群內平方和 (WCSS)': res.wcss.toFixed(4)
                });
            }
            else {
                // Classification algorithm updates accuracy
                let model;
                if (currentAlgoId === 'logistic_regression') model = solveLogisticRegression(currentPoints, customModelParams.c);
                else if (currentAlgoId === 'svm') model = solveSVM(currentPoints, customModelParams.c);
                else if (currentAlgoId === 'naive_bayes') model = fitNaiveBayes(currentPoints);
                else if (currentAlgoId === 'decision_tree') model = fitDecisionTree(currentPoints, customModelParams.maxDepth);
                else if (currentAlgoId === 'random_forest') model = fitRandomForest(currentPoints, customModelParams.numTrees, customModelParams.maxDepth);
                else if (currentAlgoId === 'xgboost') model = fitXGBoost(currentPoints, customModelParams.numTrees, customModelParams.maxDepth, customModelParams.lr);

                let correct = 0;
                for (let p of currentPoints) {
                    let prob = 0.5;
                    if (currentAlgoId === 'knn') prob = queryKNN(currentPoints, p.x, p.y, customModelParams.k);
                    else if (currentAlgoId === 'logistic_regression') prob = predictLogistic(model, p.x, p.y);
                    else if (currentAlgoId === 'svm') prob = predictSVM(model, currentPoints, p.x, p.y);
                    else if (currentAlgoId === 'naive_bayes') prob = predictNaiveBayes(model, p.x, p.y);
                    else if (currentAlgoId === 'decision_tree') prob = predictTree(model, p.x, p.y);
                    else if (currentAlgoId === 'random_forest') prob = predictRandomForest(model, p.x, p.y);
                    else if (currentAlgoId === 'xgboost') prob = predictXGBoost(model, p.x, p.y);

                    let pred = prob >= 0.5 ? 1 : 0;
                    if (pred === p.label) correct++;
                }
                const acc = correct / currentPoints.length;
                updateMetricsPanel({
                    '模型訓練精度 (Acc)': `${(acc * 100).toFixed(1)}%`,
                    '數據樣本總數': currentPoints.length
                });
            }
        } else {
            // No points
            updateMetricsPanel({
                '系統狀態': '等待添加數據點',
                '數據樣本總數': 0
            });
        }

        // 4. DRAW DATA POINTS ON CANVAS
        currentPoints.forEach(p => {
            const cx = p.x * w;
            const cy = h - (p.y * h);
            
            ctx.beginPath();
            ctx.arc(cx, cy, 6, 0, 2 * Math.PI);
            
            // Choose color representation depending on Algorithm Category
            if (currentAlgoId === 'kmeans') {
                ctx.fillStyle = getClusterPrimaryColor(p.clusterLabel !== undefined ? p.clusterLabel : 0);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.5;
            } else if (currentAlgoId === 'linear_regression' || currentAlgoId === 'pca') {
                ctx.fillStyle = '#818cf8';
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.5;
            } else {
                // Classification (Purple vs Cyan)
                if (p.label === 0) {
                    ctx.fillStyle = '#a855f7'; // Purple
                    ctx.strokeStyle = '#ffffff';
                    ctx.shadowColor = '#a855f7';
                } else {
                    ctx.fillStyle = '#06b6d4'; // Cyan
                    ctx.strokeStyle = '#ffffff';
                    ctx.shadowColor = '#06b6d4';
                }
                ctx.shadowBlur = 8;
                ctx.lineWidth = 1.5;
            }
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0; // reset
        });
    }

    function drawGridLines(w, h) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.lineWidth = 1;
        
        // Horizontal lines
        for (let i = 1; i < 10; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * h / 10);
            ctx.lineTo(w, i * h / 10);
            ctx.stroke();
        }
        // Vertical lines
        for (let i = 1; i < 10; i++) {
            ctx.beginPath();
            ctx.moveTo(i * w / 10, 0);
            ctx.lineTo(i * w / 10, h);
            ctx.stroke();
        }
    }

    // Draws temporary query distance lines for KNN hover state
    function drawKNNHoverScope(cx, cy, x, y) {
        const w = canvas.width;
        const h = canvas.height;
        const k = customModelParams.k || 5;
        
        let dists = currentPoints.map(p => {
            let d = (p.x - x)**2 + (p.y - y)**2;
            return { dist: d, p };
        });
        dists.sort((a, b) => a.dist - b.dist);
        let activeK = Math.min(k, dists.length);

        if (activeK > 0) {
            // Draw lines to K-nearest neighbors
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 1.5;
            for(let i = 0; i < activeK; i++) {
                const targetX = dists[i].p.x * w;
                const targetY = h - (dists[i].p.y * h);
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(targetX, targetY);
                ctx.stroke();
            }

            // Draw bounding circle spanning up to the K-th neighbor
            const maxD = Math.sqrt(dists[activeK - 1].dist);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
            ctx.setLineDash([5, 5]);
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(cx, cy, maxD * w, 0, 2*Math.PI);
            ctx.stroke();
            ctx.setLineDash([]); // reset
        }
    }

    // ----------------------------------------------------
    // METRICS CONTROLLER
    // ----------------------------------------------------
    function updateMetricsPanel(metrics) {
        const grid = document.getElementById('metricsGrid');
        grid.innerHTML = '';
        
        Object.entries(metrics).forEach(([lbl, val]) => {
            const card = document.createElement('div');
            card.className = 'metric-card';
            card.innerHTML = `
                <div class="metric-val">${val}</div>
                <div class="metric-lbl">${lbl}</div>
            `;
            grid.appendChild(card);
        });
    }

    // ----------------------------------------------------
    // COLOR UTILITIES
    // ----------------------------------------------------
    function getInterpolatedColor(predProb) {
        // Interpolate between light Purple (class 0) and light Cyan (class 1)
        // Purple components (R: 168, G: 85, B: 247)
        // Cyan components (R: 6, G: 182, B: 212)
        // Low opacity for decision boundary background
        const opacity = 0.22;
        const r = Math.round(168 + (6 - 168) * predProb);
        const g = Math.round(85 + (182 - 85) * predProb);
        const b = Math.round(247 + (212 - 247) * predProb);
        return `rgba(${r}, ${g}, ${b}, ${opacity})`;
    }

    function getClusterPrimaryColor(idx) {
        const colors = ['#f43f5e', '#10b981', '#fbbf24', '#3b82f6', '#8b5cf6', '#ec4899'];
        return colors[idx % colors.length];
    }

    function getClusterPastelColor(idx) {
        // Opacity version for K-Means Voronoi background
        const colorsRGB = [
            'rgba(244, 63, 94, 0.2)', // rose
            'rgba(16, 185, 129, 0.2)', // emerald
            'rgba(251, 191, 36, 0.2)', // amber
            'rgba(59, 130, 246, 0.2)', // blue
            'rgba(139, 92, 246, 0.2)', // violet
            'rgba(236, 72, 153, 0.2)'  // pink
        ];
        return colorsRGB[idx % colorsRGB.length];
    }
</script>
